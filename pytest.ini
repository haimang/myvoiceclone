[pytest]
markers =
    unit: Fast unit tests validating core logic, database, API components, and CLI without network, GPU, or external tools.
    api: FastAPI TestClient routing and request/response validation tests.
    cli: Typer CliRunner commands and stdout/stderr/exit code validation tests.
    integration: End-to-end integration/mock journey tests representing system flows.
    live: Real integration tests executing actual FFmpeg, pyannote, Demucs, or Whisper CLI/subprocesses.
    gpu: Tests requiring CUDA support, GPU resources, or active neural training setups.
    slow: Long running tasks and rehearsals.

addopts = -m "unit or api or cli or integration" --strict-markers
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
