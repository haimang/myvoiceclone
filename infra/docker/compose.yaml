# myvoiceclone Docker Compose Configuration
#
# V11 note: This compose file requires the NVIDIA Container Toolkit on aarch64 hosts.
# Installation: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html
# On Ubuntu 22.04+ aarch64:
#   distribution=$(. /etc/os-release;echo $ID$VERSION_ID)
#   curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
#   curl -s -L https://nvidia.github.io/libnvidia-container/$distribution/libnvidia-container.list | \
#     sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
#     sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
#   sudo apt-get update && sudo apt-get install -y nvidia-container-toolkit
#   sudo nvidia-ctk runtime configure --runtime=docker
#   sudo systemctl restart docker
#
# V3 note: Dockerfile.train now uses nvcr.io/nvidia/pytorch:25.03-py3 for aarch64 + Blackwell support.
# V13 note: compose.yaml commands reference placeholder data; for real usage:
#   1. Run `mvc init-db` first to create the database
#   2. Run `mvc ingest /path/to/real.wav` to add real audio
#   3. Create and freeze a dataset before running train
#
# Data volumes are mounted from the repository checkout under .data/
# so the workspace is self-contained. Large artifacts are excluded from git via .gitignore.
# V13 note: /app/data/raw/sample.wav is a placeholder path.

services:
  preprocess:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.preprocess
    volumes:
      - ../../.data/db:/app/db
      - ../../.data/artifacts:/app/data/artifacts
      - ../../.data/raw:/app/data/raw
      - ../../.data/test-runs:/app/test-runs
      - ../../configs:/app/configs:ro
    environment:
      - DB_PATH=/app/db/myvoiceclone.sqlite
      - MIGRATIONS_DIR=/app/db-migrations
      - ARTIFACT_ROOT=/app/data/artifacts
      - EVIDENCE_ROOT=/app/test-runs
      - MOCK_ADAPTERS=${MOCK_ADAPTERS:-false}
    # NOTE: /app/data/raw/sample.wav must be provided via the volume mount above.
    # For quick testing, copy any WAV file to .data/raw/sample.wav on the host.
    command: ["ingest", "/app/data/raw/sample.wav"]

  train:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.train
      args:
        TRAIN_BASE_IMAGE: ${TRAIN_BASE_IMAGE:-nvidia/cuda:13.0.0-devel-ubuntu24.04}
        INSTALL_TORCH: ${INSTALL_TORCH:-true}
        TORCH_PACKAGES: ${TORCH_PACKAGES:-torch==2.12.0}
        INSTALL_COQUI_TTS: ${INSTALL_COQUI_TTS:-true}
        COQUI_TTS_PACKAGE: ${COQUI_TTS_PACKAGE:-coqui-tts==0.27.5}
        COQUI_PIP_INDEX_URL: ${COQUI_PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    runtime: nvidia
    volumes:
      - ../../.data/db:/app/db
      - ../../.data/artifacts:/app/data/artifacts
      - ../../.data/raw:/app/data/raw
      - ../../.data/test-runs:/app/test-runs
      - ../../configs:/app/configs:ro
      - ../../.data/models:/app/models
    environment:
      - DB_PATH=/app/db/myvoiceclone.sqlite
      - MIGRATIONS_DIR=/app/db-migrations
      - ARTIFACT_ROOT=/app/data/artifacts
      - MODELS_DIR=/app/models
      - TTS_HOME=/app/models/coqui
      - HF_HOME=/app/models/huggingface
      - EVIDENCE_ROOT=/app/test-runs
      - MOCK_ADAPTERS=${MOCK_ADAPTERS:-false}
    # V11: requires nvidia-container-toolkit installed and configured (see header above)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # NOTE: TRAIN_DATASET must name an existing frozen dataset.
    # Run: mvc dataset create "$TRAIN_DATASET" && mvc dataset freeze "$TRAIN_DATASET"
    command: ["train", "sovits", "${TRAIN_DATASET:-my_dataset}"]
